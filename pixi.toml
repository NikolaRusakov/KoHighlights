[workspace]
name = "kohighlights"
version = "2.0.0"
description = "KOReader highlights manager — Flet desktop application"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]

[tasks]
run          = "python -m kohighlights.app.main"
dev          = "flet run bases/app/src/kohighlights/app/main.py"
android      = "flet run --android bases/app/src/kohighlights/app/main.py"
ios          = "flet run --ios bases/app/src/kohighlights/app/main.py"
flet-web     = "python -m kohighlights.app.main --web"
test         = "pytest"
lint         = "ruff check ."
typecheck    = "mypy ."
build-apk    = "flet build apk --module-name kohighlights-app.app.main --verbose"
build-ios    = "flet build ipa --module-name kohighlights.app.main --verbose"
build-ios-sim = "flet build ios-simulator --module-name kohighlights.app.main --verbose"

[dependencies]
python = ">=3.10"

[pypi-dependencies]
flet = ">=0.84.0, <0.85"
requests = ">=2.31"
beautifulsoup4 = ">=4.12"

# Polylith bricks — installed as editable path packages
kohighlights-models = { path = "components/models", editable = true }
kohighlights-lua-codec = { path = "components/lua_codec", editable = true }
kohighlights-book-store = { path = "components/book_store", editable = true }
kohighlights-file-scanner = { path = "components/file_scanner", editable = true }
kohighlights-highlight-exporter = { path = "components/highlight_exporter", editable = true }
kohighlights-highlight-merger = { path = "components/highlight_merger", editable = true }
kohighlights-use-cases = { path = "components/use_cases", editable = true }
kohighlights-ui = { path = "components/ui", editable = true }
kohighlights-app = { path = "bases/app", editable = true }
flet-desktop = ">=0.84.0, <0.85"
flet-cli = ">=0.84.0, <0.85"
flet-web = ">=0.84.0, <0.85"

[feature.dev.pypi-dependencies]
pytest = ">=7.4"
pytest-asyncio = ">=0.23"
mypy = ">=1.5"
ruff = ">=0.1"
polylith-cli = ">=0.7"

[environments]
dev = { features = ["dev"], solve-group = "default" }

[tool.flet]
desktop_flavor = "light"    # Change to "full" to use flet-audio and flet-video
org = "solutions.doto"
product = "kohighlights"
company = "Doto Solutions"
copyright = "Copyright (C) 2020-2026 by Doto Solutions"

[tool.flet.app]
path = "src"
# path = "bases/app/src/kohighlights/app"
